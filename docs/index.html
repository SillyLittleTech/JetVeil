    GitHub Pages redirect → jetveil.sillylittle.tech

    The JS replace() fires first in modern browsers for an instant redirect.

  <script>window.location.replace("https://jetveil.sillylittle.tech" + window.location.pathname + window.location.search + window.location.hash);</script>
