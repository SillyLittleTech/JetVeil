<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JetVeil Proxy</title>
    <meta
      name="description"
      content="JetVeil browser-style web proxy powered by Ultraviolet."
    />
    <link rel="stylesheet" href="/css/app.css" />
    <script src="/uv/uv.bundle.js" defer></script>
    <script src="/uv/uv.config.js" defer></script>
    <script src="/register-sw.js" defer></script>
    <script src="/js/app.js" defer></script>
  </head>
  <body>
    <div class="bg-orb orb-left" aria-hidden="true"></div>
    <div class="bg-orb orb-right" aria-hidden="true"></div>

    <main class="layout">
      <header class="hero">
        <p class="pill">JetVeil</p>
        <h1>Private browser-style proxy</h1>
        <p>
          Enter a URL or search query. JetVeil routes traffic through your
          Ultraviolet backend.
        </p>
      </header>

      <section class="browser-shell" aria-label="Proxy browser">
        <div class="browser-bar">
          <div class="actions" role="group" aria-label="Navigation controls">
            <button type="button" id="backBtn" class="btn" title="Back">◀</button>
            <button type="button" id="forwardBtn" class="btn" title="Forward">▶</button>
            <button type="button" id="reloadBtn" class="btn" title="Reload">↻</button>
            <button type="button" id="homeBtn" class="btn" title="Home">⌂</button>
          </div>

          <form id="addressForm" class="address-wrap" autocomplete="off">
            <input
              id="addressInput"
              name="address"
              type="text"
              placeholder="Search with DuckDuckGo or enter a URL"
              aria-label="Address bar"
            />
            <button type="submit" class="go-btn">Go</button>
          </form>
        </div>

        <div class="frame-wrap">
          <div id="welcome" class="welcome">
            <h2>Start browsing</h2>
            <p>
              Examples: <button class="link-btn" data-target="https://example.com">example.com</button>
              <button class="link-btn" data-target="news">news</button>
              <button class="link-btn" data-target="https://wikipedia.org">wikipedia.org</button>
            </p>
          </div>
          <iframe id="proxyFrame" title="Proxy content" referrerpolicy="no-referrer"></iframe>
        </div>
      </section>
    </main>
  </body>
</html>
