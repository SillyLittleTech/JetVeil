name: Pre-Release (PR Ready for Review)

on:
  pull_request:
    types:
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

jobs:
  version:
    name: Read version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
      prerelease_exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Extract version
        id: ver
        run: |
          VER=$(node -p "require('./package.json').version")
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VER}-pre" >> "$GITHUB_OUTPUT"

      - name: Check if pre-release tag already exists
        id: check
        run: |
          TAG="v${{ steps.ver.outputs.version }}-pre"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "exists=true"  >> "$GITHUB_OUTPUT"
            echo "::notice::Pre-release ${TAG} already exists — skipping build."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: version
    if: needs.version.outputs.prerelease_exists == 'false'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Linux artifacts
        run: npm run build:linux

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build-pre
          path: |
            desktop/dist/*.AppImage
            desktop/dist/*.deb
            desktop/dist/latest-linux.yml
          if-no-files-found: error
          retention-days: 7

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: version
    if: needs.version.outputs.prerelease_exists == 'false'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Windows artifacts
        run: npm run build:windows

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build-pre
          path: |
            desktop/dist/*Setup*.exe
            desktop/dist/*portable*.exe
            desktop/dist/latest.yml
          if-no-files-found: error
          retention-days: 7

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: version
    if: needs.version.outputs.prerelease_exists == 'false'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build macOS artifacts
        run: npm run build:mac:unsigned

      - name: Ad-hoc sign macOS app and repackage ZIP
        run: |
          set -euo pipefail
          APP_PATH=$(find desktop/dist -type d -name "JetVeil.app" | head -n 1)
          if [ -z "${APP_PATH}" ]; then
            echo "::error::JetVeil.app not found in desktop/dist"
            exit 1
          fi

          xattr -cr "${APP_PATH}"
          xattr -d com.apple.FinderInfo "${APP_PATH}" 2>/dev/null || true
          codesign --force --deep --sign - "${APP_PATH}"
          codesign --verify --deep --verbose=2 "${APP_PATH}"

          EXISTING_ZIP=$(find desktop/dist -maxdepth 1 -type f -name "*-mac.zip" | head -n 1)
          if [ -n "${EXISTING_ZIP}" ]; then
            rm -f "${EXISTING_ZIP}"
          fi

          ditto -c -k --sequesterRsrc --keepParent \
            "${APP_PATH}" \
            "desktop/dist/JetVeil-${{ needs.version.outputs.version }}-adhoc-mac.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build-pre
          path: desktop/dist/*-mac.zip
          if-no-files-found: error
          retention-days: 7

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build-pre-metadata
          path: |
            desktop/dist/*.blockmap
            desktop/dist/latest-mac.yml
          if-no-files-found: warn
          retention-days: 7

  pre-release:
    name: Create Pre-Release
    runs-on: ubuntu-latest
    needs:
      - version
      - build-linux
      - build-windows
      - build-macos
    if: needs.version.outputs.prerelease_exists == 'false'
    env:
      TAG: ${{ needs.version.outputs.tag }}
      VER: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: '*-pre'
          path: artifacts

      - name: Create pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: "JetVeil ${{ env.VER }} (pre-release)"
          prerelease: true
          generate_release_notes: false
          body: |
            ## ⚠️ Pre-release — JetVeil v${{ env.VER }}

            Automated pre-release built from PR #${{ github.event.pull_request.number }}:
            _"${{ github.event.pull_request.title }}"_

            Built from commit `${{ github.sha }}` on branch `${{ github.head_ref }}`.

            > **Not for production use.** This build may be unstable.

            ### Downloads
            Includes Linux, Windows, and macOS builds generated from `desktop/` using Electron Builder.
          files: |
            artifacts/linux-build-pre/*
            artifacts/windows-build-pre/*
            artifacts/macos-build-pre/*
            artifacts/macos-build-pre-metadata/*

  notify-duplicate:
    name: Notify duplicate pre-release
    runs-on: ubuntu-latest
    needs: version
    if: needs.version.outputs.prerelease_exists == 'true'
    steps:
      - uses: mshick/add-pr-comment@v2
        with:
          message: |
            ⚠️ **Pre-release skipped** — a pre-release for `${{ needs.version.outputs.tag }}` already exists.

            Bump `version` in `package.json` and re-mark this PR as ready for review to trigger a new build.
