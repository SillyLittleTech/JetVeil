<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
        content="JetVeil — a deep proxy browser using Ultraviolet on web and ScramJet on desktop.">

  <!-- PWA / iOS -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="JetVeil">
  <meta name="theme-color" content="#0D0D17">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="manifest" href="manifest.json">
  <title>JetVeil</title>

  <style>
    body {
      background-color: #0D0D17;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
      color: #00E5FF;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      letter-spacing: 0.5px;
    }
    #loading svg {
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div id="loading">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
         xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2L4 6V12C4 16.418 7.582 20.472 12 22
               C16.418 20.472 20 16.418 20 12V6L12 2Z"
            fill="#00E5FF" fill-opacity="0.9"/>
    </svg>
    <span>JetVeil</span>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
