name: Pre-Release (PR Ready for Review)

# Web deployment is handled automatically by Cloudflare Pages (configured in
# the CF dashboard — no CI step needed here).
on:
  pull_request:
    types:
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Read version from pubspec.yaml on the PR branch
  # ────────────────────────────────────────────────────────────────────────────
  version:
    name: Read version
    runs-on: ubuntu-latest
    outputs:
      version:           ${{ steps.ver.outputs.version }}
      build_number:      ${{ steps.ver.outputs.build_number }}
      tag:               ${{ steps.ver.outputs.tag }}
      prerelease_exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Extract version
        id: ver
        run: |
          VER=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          BUILD=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f2)
          echo "version=${VER}"                 >> "$GITHUB_OUTPUT"
          echo "build_number=${BUILD}"          >> "$GITHUB_OUTPUT"
          echo "tag=v${VER}+${BUILD}-pre"       >> "$GITHUB_OUTPUT"

      - name: Check if pre-release tag already exists
        id: check
        run: |
          TAG="v$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)+$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f2)-pre"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "exists=true"  >> "$GITHUB_OUTPUT"
            echo "::notice::Pre-release ${TAG} already exists — skipping build."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  # ────────────────────────────────────────────────────────────────────────────
  # Linux build
  # ────────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: version
    if: needs.version.outputs.prerelease_exists == 'false'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libssl-dev

      - name: Enable Linux desktop & generate platform files
        run: |
          flutter config --enable-linux-desktop
          flutter create --platforms=linux .

      - run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release

      - name: Package Linux build
        run: |
          cd build/linux/x64/release/bundle
          tar -czf ../../../../../jetveil-linux-x64.tar.gz .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build-pre
          path: jetveil-linux-x64.tar.gz
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # Windows build
  # ────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: version
    if: needs.version.outputs.prerelease_exists == 'false'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop & generate platform files
        run: |
          flutter config --enable-windows-desktop
          flutter create --platforms=windows .

      - run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package Windows build
        shell: pwsh
        run: |
          Compress-Archive `
            -Path   build/windows/x64/runner/Release/* `
            -DestinationPath jetveil-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build-pre
          path: jetveil-windows-x64.zip
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # macOS build
  # ────────────────────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: version
    if: needs.version.outputs.prerelease_exists == 'false'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable macOS desktop & generate platform files
        run: |
          flutter config --enable-macos-desktop
          flutter create --platforms=macos .

      - run: flutter pub get

      - name: Install CocoaPods
        run: |
          sudo gem install -n /usr/local/bin cocoapods
          pod repo update

      - name: Build macOS release
        run: flutter build macos --release

      - name: Package macOS build
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../jetveil-macos.zip JetVeil.app

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build-pre
          path: jetveil-macos.zip
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # Create pre-release
  # ────────────────────────────────────────────────────────────────────────────
  pre-release:
    name: Create Pre-Release
    runs-on: ubuntu-latest
    needs:
      - version
      - build-linux
      - build-windows
      - build-macos
    if: needs.version.outputs.prerelease_exists == 'false'
    env:
      TAG:    ${{ needs.version.outputs.tag }}
      VER:    ${{ needs.version.outputs.version }}
      BUILD:  ${{ needs.version.outputs.build_number }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: '*-pre'
          path: artifacts

      - name: Create pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: "JetVeil ${{ env.VER }}+${{ env.BUILD }} (pre-release)"
          prerelease: true
          generate_release_notes: false
          body: |
            ## ⚠️ Pre-release — JetVeil v${{ env.VER }}+${{ env.BUILD }}

            Automated pre-release built from PR #${{ github.event.pull_request.number }}:
            _"${{ github.event.pull_request.title }}"_

            Built from commit `${{ github.sha }}` on branch `${{ github.head_ref }}`.

            > **Not for production use.** This build may be unstable.

            ### Downloads
            | Platform | File |
            |----------|------|
            | 🐧 Linux (x64) | `jetveil-linux-x64.tar.gz` |
            | 🪟 Windows (x64) | `jetveil-windows-x64.zip` |
            | 🍎 macOS | `jetveil-macos.zip` |

            ### Server
            The server is not bundled in these artifacts.
            Deploy it separately via the one-click Vercel button in the app Settings.
          files: |
            artifacts/linux-build-pre/jetveil-linux-x64.tar.gz
            artifacts/windows-build-pre/jetveil-windows-x64.zip
            artifacts/macos-build-pre/jetveil-macos.zip

  # ────────────────────────────────────────────────────────────────────────────
  # Notify when a pre-release for this version already exists
  # ────────────────────────────────────────────────────────────────────────────
  notify-duplicate:
    name: Notify duplicate pre-release
    runs-on: ubuntu-latest
    needs: version
    if: needs.version.outputs.prerelease_exists == 'true'
    steps:
      - uses: mshick/add-pr-comment@v2
        with:
          message: |
            ⚠️ **Pre-release skipped** — a pre-release for `${{ needs.version.outputs.tag }}` already exists.

            Bump `version` in `pubspec.yaml` and re-mark this PR as ready for review to trigger a new build.
