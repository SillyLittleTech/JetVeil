name: jet_veil
description: JetVeil — a deep proxy browser powered by the Scramjet engine. Successor to ACprox.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.3.0
  url_launcher: ^6.3.0
  webview_flutter: ^4.10.0
  webview_flutter_wkwebview: ^3.18.1
  webview_flutter_android: ^4.3.0
  http: ^1.2.1
  flutter_svg: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
