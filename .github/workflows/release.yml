name: Build & Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  version:
    name: Read version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Extract version
        id: ver
        run: |
          VER=$(node -p "require('./package.json').version")
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VER}" >> "$GITHUB_OUTPUT"

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm run install:all

      - name: Build Linux artifacts
        run: npm run build:linux

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            desktop/dist/*.AppImage
            desktop/dist/*.deb
            desktop/dist/latest-linux.yml
          if-no-files-found: error
          retention-days: 7

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: version
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm run install:all

      - name: Build Windows artifacts
        run: npm run build:windows

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            desktop/dist/*Setup*.exe
            desktop/dist/*portable*.exe
            desktop/dist/latest.yml
          if-no-files-found: error
          retention-days: 7

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: version
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm run install:all

      - name: Build macOS artifacts
        run: npm run build:mac

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            desktop/dist/*-mac.zip
            desktop/dist/latest-mac.yml
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      - version
      - build-linux
      - build-windows
      - build-macos
    env:
      TAG: ${{ needs.version.outputs.tag }}
      VER: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: "JetVeil ${{ env.VER }}"
          prerelease: false
          generate_release_notes: true
          body: |
            ## JetVeil v${{ env.VER }}

            Automated Electron release built from commit `${{ github.sha }}`.

            ### Desktop Downloads
            Includes Linux, Windows, and macOS builds generated from `desktop/` using Electron Builder.
          files: |
            artifacts/linux-build/*
            artifacts/windows-build/*
            artifacts/macos-build/*
