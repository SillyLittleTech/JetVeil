<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
        content="JetVeil — deep proxy powered by Scramjet">
  <meta name="theme-color" content="#0D0D17">

  <!-- Required by Scramjet for SharedArrayBuffer -->
  <meta http-equiv="origin-trial" content="">

  <title>JetVeil</title>
  <link rel="icon" type="image/png" href="/assets/jetveiliconDefault-1024x1024@1x.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- ── Loading state ─────────────────────────────────────────────────── -->
  <div id="loading-screen">
    <div class="logo-pulse">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none"
           xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M12 2L4 6V12C4 16.418 7.582 20.472 12 22
                 C16.418 20.472 20 16.418 20 12V6L12 2Z"
              fill="#00E5FF"/>
      </svg>
    </div>
    <p class="loading-label">Initialising Scramjet…</p>
    <button id="debug-toggle" class="debug-toggle" type="button">
      Advanced Debugging Info
    </button>
  </div>

  <!-- ── Error state ────────────────────────────────────────────────────── -->
  <div id="error-screen" hidden>
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
         xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M12 2L4 6V12C4 16.418 7.582 20.472 12 22
               C16.418 20.472 20 16.418 20 12V6L12 2Z"
            fill="#FF3D00" fill-opacity="0.8"/>
    </svg>
    <h2>Scramjet failed to initialise</h2>
    <p id="error-message">An unknown error occurred.</p>
    <button onclick="location.reload()">Retry</button>
    <button id="debug-toggle-error" class="debug-toggle" type="button">
      Advanced Debugging Info
    </button>
  </div>

  <!-- ── Main UI (shown after Scramjet is ready) ──────────────────────── -->
  <div id="app" hidden>
    <header class="toolbar">
      <div class="brand">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
             xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M12 2L4 6V12C4 16.418 7.582 20.472 12 22
                   C16.418 20.472 20 16.418 20 12V6L12 2Z"
                fill="#00E5FF"/>
        </svg>
        <span class="brand-name">JetVeil</span>
      </div>

      <div class="nav-actions">
        <button class="icon-btn" id="nav-back" title="Back" aria-label="Back">
          ←
        </button>
        <button class="icon-btn" id="nav-forward" title="Forward" aria-label="Forward">
          →
        </button>
        <button class="icon-btn" id="nav-reload" title="Reload" aria-label="Reload">
          ↻
        </button>
      </div>

      <form id="url-form" class="url-form" autocomplete="off">
        <div class="url-bar">
          <svg class="url-icon" width="16" height="16" viewBox="0 0 24 24"
               fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M12 2L4 6V12C4 16.418 7.582 20.472 12 22
                     C16.418 20.472 20 16.418 20 12V6L12 2Z"
                  fill="currentColor"/>
          </svg>
          <input
            id="url-input"
            type="text"
            placeholder="Enter a URL or search term…"
            spellcheck="false"
            autocomplete="off"
            aria-label="URL or search"
          >
          <button type="submit" class="go-btn" aria-label="Go">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                 xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </form>

      <div class="toolbar-actions">
        <button class="icon-btn" id="nav-new-tab" title="New tab" aria-label="New tab">
          ＋
        </button>
        <button class="icon-btn" id="nav-close-tab" title="Close tab" aria-label="Close tab">
          ✕
        </button>
        <button class="icon-btn" id="nav-settings" title="Browser settings" aria-label="Browser settings">
          ⚙
        </button>
        <button class="icon-btn" id="debug-btn" title="Advanced Debugging Info" aria-label="Advanced Debugging Info">
          🧪
        </button>
        <button class="icon-btn" id="home-btn" title="Home" aria-label="Home">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
               xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"
                  stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </header>

    <div id="tab-strip" aria-label="Browser tabs"></div>

    <!-- Home / new-tab page (visible when no URL is loaded) -->
    <main id="home-page">
      <div class="home-hero">
        <svg width="72" height="72" viewBox="0 0 24 24" fill="none"
             xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M12 2L4 6V12C4 16.418 7.582 20.472 12 22
                   C16.418 20.472 20 16.418 20 12V6L12 2Z"
                fill="#00E5FF" fill-opacity="0.15"/>
          <path d="M12 2L4 6V12C4 16.418 7.582 20.472 12 22
                   C16.418 20.472 20 16.418 20 12V6L12 2Z"
                stroke="#00E5FF" stroke-width="1.5"/>
        </svg>
        <h1>JetVeil</h1>
        <p>Powered by <a href="https://github.com/MercuryWorkshop/scramjet"
                         target="_blank" rel="noopener">Scramjet</a>.
           Enter any URL above to start browsing.</p>
      </div>

      <div class="quick-grid">
        <button class="quick-card" data-url="https://google.com">
          <span class="quick-icon">🔍</span>
          <span>Google</span>
        </button>
        <button class="quick-card" data-url="https://youtube.com">
          <span class="quick-icon">▶️</span>
          <span>YouTube</span>
        </button>
        <button class="quick-card" data-url="https://reddit.com">
          <span class="quick-icon">💬</span>
          <span>Reddit</span>
        </button>
        <button class="quick-card" data-url="https://discord.com">
          <span class="quick-icon">🎮</span>
          <span>Discord</span>
        </button>
        <button class="quick-card" data-url="https://x.com">
          <span class="quick-icon">#️⃣</span>
          <span>Twitter / X</span>
        </button>
        <button class="quick-card" data-url="https://wikipedia.org">
          <span class="quick-icon">📖</span>
          <span>Wikipedia</span>
        </button>
      </div>
    </main>

    <section id="frame-host" hidden></section>
  </div>

  <section id="browser-prefs-panel" hidden>
    <div class="browser-prefs-header">
      <h3>Browser Settings</h3>
      <button id="browser-prefs-close" type="button" title="Close browser settings">✕</button>
    </div>
    <form id="browser-prefs-form" class="browser-prefs-form">
      <label class="prefs-field">
        <span>Bypass hosts</span>
        <textarea
          id="bypass-hosts"
          rows="5"
          placeholder="google.com\n*.google.com\nrecaptcha.net\ngstatic.com"
        ></textarea>
        <small>One host per line or comma-separated. Matching hosts open outside the proxy.</small>
      </label>

      <label class="prefs-switch">
        <input id="open-bypassed-externally" type="checkbox">
        <span>
          <strong>Open bypassed sites externally</strong>
          <small>Launch matched sites in the browser instead of the proxy.</small>
        </span>
      </label>

      <label class="prefs-switch">
        <input id="compact-toolbar" type="checkbox">
        <span>
          <strong>Compact toolbar</strong>
          <small>Use a tighter browser chrome layout.</small>
        </span>
      </label>

      <div class="browser-prefs-actions">
        <button type="submit" class="primary">Save browser settings</button>
      </div>
    </form>
  </section>

  <section id="debug-panel" hidden>
    <div class="debug-panel-header">
      <h3>Advanced Debugging Info</h3>
      <div class="debug-controls">
        <button id="debug-pause" type="button" title="Pause log updates">⏸ Pause</button>
        <button id="debug-copy" type="button" title="Copy all logs to clipboard">📋 Copy</button>
        <button id="debug-close" type="button" title="Close debug panel">✕</button>
      </div>
    </div>
    <p class="debug-note">Includes recent browser logs and server logs.</p>
    <pre id="debug-content">No debug data yet.</pre>
  </section>

  <script type="module" src="browser.js"></script>
</body>
</html>
